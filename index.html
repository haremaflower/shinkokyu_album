<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>花と、月1の深呼吸</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
  :root{
    --bg: #faf6ee;
    --text: #453b30;
    --text-soft: #8a7f6f;
    --beige: #f2ecdf;
    --beige-line: #e3d9c4;
    --line: #e6ded0;
    --olive: #7c8768;
    --olive-dark: #626d54;
    --terracotta: #c99b7a;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .shippori { font-family: 'Shippori Mincho', serif; }

  header {
    padding: 24px 20px 16px;
    text-align: center;
    background: var(--bg);
  }
  header h1 {
    margin: 0; font-size: 18px; font-weight: 500; letter-spacing: 0.15em;
    color: var(--text);
  }
  header p {
    margin: 6px 0 0; font-size: 11px; letter-spacing: 0.08em; color: var(--text-soft);
  }

  #greeting {
    padding: 0 20px; text-align: center; font-size: 13px; color: var(--text);
    margin-bottom: 12px;
  }

  .premium-badge-container {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  .premium-badge {
    background: linear-gradient(135deg, #d4af37, #aa7c11);
    color: #fff; font-size: 11px; font-weight: 500; padding: 4px 14px;
    border-radius: 20px; letter-spacing: 0.05em; box-shadow: 0 2px 6px rgba(170,124,17,0.2);
  }

  .sample-alert {
    margin: 0 20px 24px; padding: 18px; background: #fff;
    border: 1px solid var(--beige-line); border-radius: 8px; text-align: center;
  }
  .sample-alert-title {
    font-size: 14px; font-weight: 600; color: var(--terracotta); margin-bottom: 8px;
  }
  .sample-alert-text {
    font-size: 12px; color: var(--text); line-height: 1.6; text-align: left;
    margin: 0 0 12px; display: inline-block;
  }
  .sample-alert-sub {
    font-size: 11px; color: var(--text-soft); line-height: 1.5; border-top: 1px dashed var(--beige-line);
    padding-top: 10px; margin: 0; text-align: left;
  }

  .container { padding: 0 20px 40px; }

  .section-title {
    font-size: 14px; font-weight: 500; letter-spacing: 0.1em; color: var(--olive);
    margin: 32px 0 16px; padding-bottom: 6px; border-bottom: 1px solid var(--line);
  }

  .album-card {
    background: #fff; border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 14px rgba(69,59,48,0.04);
    margin-bottom: 28px; border: 1px solid rgba(230,222,208,0.5);
  }
  .album-header {
    padding: 14px 16px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .album-title-group { display: flex; align-items: center; gap: 8px; }
  .album-vol {
    font-size: 11px; font-weight: 500; color: #fff; background: var(--olive);
    padding: 1px 6px; border-radius: 3px; letter-spacing: 0.02em;
  }
  .album-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .album-date { font-size: 11px; color: var(--text-soft); font-family: sans-serif; }

  .photo-grid {
    display: grid; grid-template-columns: 1fr; gap: 2px; background: var(--line); padding: 2px 0;
  }
  .photo-grid.grid-2 { grid-template-columns: 1fr 1fr; }
  .photo-grid.grid-3 { grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; }
  .photo-grid.grid-3 .photo-wrapper:first-child { grid-row: span 2; }

  .photo-wrapper {
    position: relative; width: 100%; padding-top: 66.66%; background: #eae4d9; overflow: hidden;
  }
  .photo-grid.grid-3 .photo-wrapper:first-child { padding-top: 133.6%; }
  .photo-wrapper img {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    cursor: pointer; transition: transform 0.2s ease;
  }
  .photo-wrapper img:active { transform: scale(0.97); }

  .comment-box {
    padding: 16px; background: #fff; font-size: 12.5px; line-height: 1.6; color: var(--text);
  }

  .flower-tags {
    padding: 0 16px 16px; display: flex; flex-wrap: wrap; gap: 6px; background: #fff;
  }
  .flower-tag {
    font-size: 11px; color: var(--olive); background: var(--bg); padding: 4px 10px;
    border-radius: 4px; border: 1px solid var(--beige-line); cursor: pointer;
    transition: all 0.2s ease;
  }
  .flower-tag:active { background: var(--beige); }

  /* 花の図鑑ミニパネル */
  .flower-panel {
    background: var(--bg); border-top: 1px dashed var(--beige-line); padding: 12px 16px;
    display: flex; gap: 12px; align-items: center;
  }
  .flower-panel-img {
    width: 38px; height: 38px; border-radius: 4px; object-fit: cover; background: #eae4d9;
  }
  .flower-panel-info {
    flex: 1; font-size: 11px; line-height: 1.4; color: var(--text-soft);
  }
  .flower-panel-name {
    font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px;
  }

  .teaser-card {
    background: #fff; border: 1px dashed var(--olive); border-radius: 8px; padding: 16px;
    margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .teaser-info { flex: 1; padding-right: 12px; }
  .teaser-month {
    font-size: 11px; color: var(--olive); font-weight: 500; margin-bottom: 2px;
  }
  .teaser-title {
    font-size: 13.5px; font-weight: 600; color: var(--text);
  }
  .teaser-date {
    font-size: 11.5px; color: var(--terracotta); font-weight: 500; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
  }
  .interest-btn {
    border: 1px solid var(--olive); background: #fff; color: var(--olive);
    padding: 6px 12px; border-radius: 6px; font-size: 11.5px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: all 0.2s ease; white-space: nowrap;
  }
  .interest-btn.active {
    background: var(--olive); color: #fff;
  }

  .id-section {
    margin-top: 24px; padding: 20px; background: var(--beige); border-radius: 8px;
    text-align: center; border: 1px solid var(--beige-line);
  }
  .id-title { font-size: 11px; color: var(--text-soft); margin-bottom: 6px; letter-spacing: 0.05em; }
  .id-value { font-size: 11px; color: var(--text); font-family: monospace; background: #fff; padding: 4px 8px; border-radius: 4px; display: inline-block; word-break: break-all; margin-bottom: 10px; border: 1px solid var(--line); }
  .copy-btn {
    background: var(--text); color: #fff; border: none; padding: 6px 16px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: background 0.2s;
  }
  .copy-btn.copied { background: var(--olive); }

  .state-message { text-align: center; padding: 60px 20px; font-size: 13px; color: var(--text-soft); }

  /* 🔍 画像拡大モーダル用スタイル */
  #photoModal {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(43, 37, 30, 0.92); z-index: 1000; justify-content: center; align-items: center;
    padding: 16px; opacity: 0; transition: opacity 0.2s ease;
  }
  #photoModal.open { display: flex; opacity: 1; }
  #modalImg {
    max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3); transform: scale(0.95); transition: transform 0.2s ease;
  }
  #photoModal.open #modalImg { transform: scale(1); }
</style>
</head>
<body>

<header>
  <h1 class="shippori">花と、月1の深呼吸</h1>
  <p>DIGITAL PHOTO ALBUM</p>
</header>

<div id="greeting"></div>
<div id="premiumAlert"></div>
<div id="statusAlert"></div>

<div class="container" id="container">
  <div class="state-message">読み込み中...</div>
</div>

<div id="photoModal" onclick="closeModal()">
  <img id="modalImg" src="" alt="拡大写真">
</div>

<script>
  // ★正しいGASのAPI URLに書き換えました
  var API_URL = 'https://script.google.com/macros/s/AKfycbywcBgmXuudaIz09Zj8bxvBvy9tbi0QGsmdNioEb_SNvWT8x789yleolYqEqtHQgzrUYg/exec';
  var currentUserId = '';
  var currentUserName = '';
  var flowerPhotoMap = {};

  document.addEventListener('DOMContentLoaded', function () {
    // ★正しいLIFF IDに修正済み
    liff.init({ liffId: '2010604310-qrcPhB5E' }).then(function () {
      if (liff.isLoggedIn()) {
        var context = liff.getContext();
        currentUserId = context ? context.userId : 'W_SAMPLE_USER_ID_9999';
        fetchData(currentUserId);
      } else {
        liff.login();
      }
    }).catch(function (err) {
      showError('LIFF初期化エラー: ' + err);
    });
  });

  function fetchData(userId) {
    fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getPageData', lineUserId: userId })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.error) {
        showError(data.error);
        return;
      }
      currentUserName = data.name || '';
      flowerPhotoMap = data.flowerPhotoMap || {};
      renderPage(data);
    })
    .catch(function (err) {
      showError('通信エラーが発生しました。');
    });
  }

  function renderPage(data) {
    var greetingEl = document.getElementById('greeting');
    if (currentUserName) {
      greetingEl.innerHTML = '<span class="shippori" style="font-size:15px; font-weight:600;">' + escapeHtml(currentUserName) + ' 様</span><br><span style="font-size:11px; color:var(--text-soft);">いつもお越しいただきありがとうございます</span>';
    } else {
      greetingEl.innerHTML = '<span class="shippori" style="font-size:14px;">ゲスト 様</span>';
    }

    var premiumEl = document.getElementById('premiumAlert');
    if (data.premium && data.premium.isPremiumMember) {
      premiumEl.innerHTML = '<div class="premium-badge-container"><div class=\"premium-badge\">FLOWER PREMIUM PASS 会員</div></div>';
    } else {
      premiumEl.innerHTML = '';
    }

    var alertEl = document.getElementById('statusAlert');
    if (data.isSample) {
      if (data.isExpired) {
        alertEl.innerHTML = '\
          <div class="sample-alert">\
            <div class="sample-alert-title">アルバムの保管期限が満了しました</div>\
            <p class="sample-alert-text">\
              お預かりしていたアルバムの閲覧期限（最終参加月から1年間）が満了したため、現在は体験用サンプルを表示しています。\
            </p>\
            <p class="sample-alert-sub">\
              過去にご参加いただいた方で、アルバム作成・再開をご希望の方は、公式LINEより「アルバム作成希望」とメッセージをお送りください🌸\
            </p>\
          </div>\
        ';
      } else {
        alertEl.innerHTML = '\
          <div class="sample-alert">\
            <div class="sample-alert-title">体験用サンプル</div>\
            <p class="sample-alert-text">\
              これは体験用サンプルです。<br>\
              実際にワークショップにご参加いただくと、あなたの作品もこんな風に記録として残ります。\
            </p>\
            <p class="sample-alert-sub">\
              過去にご参加いただいた方で、アルバム作成ご希望の方は、公式LINEより「アルバム作成希望」とメッセージをお送りください✨\
            </p>\
          </div>\
        ';
      }
    } else {
      alertEl.innerHTML = '';
    }

    var html = '';

    // アルバム一覧
    html += '<div class="section-title">MY MEMORIES</div>';
    if (!data.albums || data.albums.length === 0) {
      html += '<div class="state-message">まだお写真の登録がありません。<br>これからのワークショップをどうぞお楽しみに。</div>';
    } else {
      data.albums.forEach(function (album) {
        var gridClass = 'photo-grid';
        if (album.photos.length === 2) gridClass += ' grid-2';
        if (album.photos.length >= 3) gridClass += ' grid-3';

        html += '<div class="album-card">';
        html += '  <div class="album-header">';
        html += '    <div class="album-title-group">';
        if (album.volNumber) html += '      <span class="album-vol">' + escapeHtml(album.volNumber) + '</span>';
        html += '      <span class="album-title shippori">' + escapeHtml(album.themeTitle) + '</span>';
        html += '    </div>';
        html += '    <div class="album-date">' + escapeHtml(album.visitDateFormatted) + '</div>';
        html += '  </div>';

        if (album.photos.length > 0) {
          html += '  <div class="' + gridClass + '">';
          album.photos.slice(0, 3).forEach(function (url) {
            html += '    <div class="photo-wrapper"><img src="' + url + '" alt="お花の写真" onclick="openModal(\'' + escapeJs(url) + '\')"></div>';
          });
          html += '  </div>';
        }

        if (album.aiComment) {
          html += '  <div class="comment-box">' + album.aiComment.replace(/\n/g, '<br>') + '</div>';
        }

        if (album.flowers && album.flowers.length > 0) {
          html += '  <div class="flower-tags">';
          album.flowers.forEach(function (fl) {
            html += '    <span class="flower-tag" onclick="toggleFlowerPanel(this, \'' + escapeJs(fl) + '\')"># ' + escapeHtml(fl) + '</span>';
          });
          html += '  </div>';
        }

        html += '</div>';
      });
    }

    // 次回テーマ一覧
    if (data.upcomingThemes && data.upcomingThemes.length > 0) {
      html += '<div class="section-title">UPCOMING THEMES</div>';
      html += '<div style="font-size: 12px; color: var(--text-soft); line-height: 1.6; margin: -8px 0 18px;">これから先の季節に、どんな出会いが待っているか。<br>みなさまと季節を楽しめることを楽しみにしています</div>';

      data.upcomingThemes.forEach(function (theme) {
        var isInterested = data.interestedVols.indexOf(theme.volNumber) !== -1;
        var btnClass = isInterested ? 'interest-btn active' : 'interest-btn';
        var btnText = isInterested ? '気付み' : '気になる';

        var statusStr = theme.status || '';

        html += '<div class="teaser-card">';
        html += '  <div class="teaser-info">';
        html += '
